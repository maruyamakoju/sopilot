# =============================================================================
# SOPilot CI — GitHub Actions
# =============================================================================
# Runs on every push / PR to main, production, or develop.
# On push to production: also builds and pushes the Docker image to ghcr.io.
# =============================================================================

name: SOPilot CI

on:
  push:
    branches:
      - main
      - production
      - develop
  pull_request:
    branches:
      - main
      - production
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # test — runs pytest against the full test suite
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --tb=short -q
        env:
          # Disable any network calls or VLM inference during CI
          SOPILOT_EMBEDDER_BACKEND: color-motion
          SOPILOT_ALLOW_EMBEDDER_FALLBACK: "true"
          SOPILOT_LOG_JSON: "false"
          SOPILOT_LOG_LEVEL: WARNING
          # Stub API keys so key-validation code paths don't error
          ANTHROPIC_API_KEY: ci-stub-key
          VIGIL_VLM_API_KEY: ci-stub-key

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ github.run_id }}
          path: |
            .pytest_cache/
            test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # docker-build — build and push the Docker image (production branch only)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build & push (production only)
    runs-on: ubuntu-latest
    needs: test
    # Only run on direct pushes (not PRs) to the production branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the short commit SHA
            type=sha,prefix=sha-,format=short
            # Tag production branch as "production"
            type=ref,event=branch
            # Tag as "latest" on production branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/production' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args for traceability
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
