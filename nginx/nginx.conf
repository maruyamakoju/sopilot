# =============================================================================
# SOPilot -- nginx reverse proxy configuration
# =============================================================================
# Drop-in for production.  Assumes:
#   /etc/nginx/ssl/cert.pem  -- TLS certificate (fullchain)
#   /etc/nginx/ssl/key.pem   -- TLS private key
#
# To generate a self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/ssl/key.pem -out nginx/ssl/cert.pem \
#     -subj "/CN=sopilot.local"
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/sopilot_error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/sopilot_access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Security headers (applied in server blocks below)
    # -------------------------------------------------------------------------
    # Hide nginx version
    server_tokens  off;

    # -------------------------------------------------------------------------
    # Video upload: allow large request bodies (up to 500 MB for video files)
    # -------------------------------------------------------------------------
    client_max_body_size  500M;

    # Increase timeouts for large video uploads and long-running scoring jobs
    client_body_timeout    300s;
    proxy_read_timeout     300s;
    proxy_send_timeout     300s;
    proxy_connect_timeout   10s;

    # -------------------------------------------------------------------------
    # Upstream: SOPilot FastAPI application
    # -------------------------------------------------------------------------
    upstream sopilot {
        server sopilot:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Server block: HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        # ACME challenge passthrough (Let's Encrypt / certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # Server block: HTTPS (TLS termination + reverse proxy)
    # -------------------------------------------------------------------------
    server {
        listen       443 ssl;
        listen  [::]:443 ssl;
        http2         on;
        server_name   _;

        # ------------------------------------------------------------------
        # SSL / TLS
        # ------------------------------------------------------------------
        ssl_certificate      /etc/nginx/ssl/cert.pem;
        ssl_certificate_key  /etc/nginx/ssl/key.pem;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # Modern TLS — disable SSLv3 / TLS 1.0 / TLS 1.1
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # HSTS (1 year; uncomment once TLS is confirmed working end-to-end)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ------------------------------------------------------------------
        # Security headers
        # ------------------------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"              always;
        add_header X-Content-Type-Options    "nosniff"                 always;
        add_header X-XSS-Protection          "1; mode=block"           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ------------------------------------------------------------------
        # Logging (per-vhost overrides)
        # ------------------------------------------------------------------
        access_log  /var/log/nginx/sopilot_access.log  main;
        error_log   /var/log/nginx/sopilot_error.log   warn;

        # ------------------------------------------------------------------
        # WebSocket support headers (required for future streaming endpoints)
        # ------------------------------------------------------------------
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # ------------------------------------------------------------------
        # Proxy to SOPilot FastAPI
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://sopilot;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Forwarded-Host   $host;
            proxy_set_header   X-Forwarded-Port   $server_port;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Keep-alive to upstream
            proxy_set_header   Connection "";

            # Buffer tuning for large JSON responses
            proxy_buffering           on;
            proxy_buffer_size         16k;
            proxy_buffers             8 16k;
            proxy_busy_buffers_size   32k;

            # Disable buffering for streaming/SSE endpoints
            # proxy_buffering off;   # uncomment if using EventSource/SSE
        }

        # ------------------------------------------------------------------
        # Health check endpoint — no logging to reduce noise
        # ------------------------------------------------------------------
        location /health {
            proxy_pass         http://sopilot;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # ------------------------------------------------------------------
        # Static assets: long-lived cache headers
        # ------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass         http://sopilot;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires            30d;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }
    }
}
